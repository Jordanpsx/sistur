<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ company_name }} | {{ 'Editar' if produto else 'Novo' }} Produto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0d9488', light: '#ccfbf1', dark: '#0f766e' } } } }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .form-input { @apply w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30; }
    .form-label { @apply block text-sm font-medium text-slate-600 mb-1; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-slate-100">

  <header class="bg-white/80 backdrop-blur border-b border-slate-100 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
      <span class="font-bold text-slate-700 text-sm">
        {{ company_name | e }} <span class="text-slate-400 font-normal">| {{ 'Editar' if produto else 'Novo' }} Produto</span>
      </span>
      <a href="{{ url_for('estoque.listar_produtos') }}" class="text-sm text-slate-500 hover:text-primary transition-colors">← Produtos</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 rounded-xl px-4 py-3 text-sm font-medium
          {% if category == 'sucesso' %}bg-green-50 text-green-700 border border-green-200
          {% elif category == 'erro' %}bg-red-50 text-red-700 border border-red-200
          {% else %}bg-yellow-50 text-yellow-700 border border-yellow-200{% endif %}">
          {{ message | e }}
        </div>
      {% endfor %}
    {% endwith %}

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-6">
        {{ 'Editar Produto' if produto else 'Novo Produto' }}
      </h2>

      <form method="POST"
            action="{{ url_for('estoque.editar_produto', produto_id=produto.id) if produto else url_for('estoque.novo_produto') }}"
            class="space-y-5">

        <!-- Nome + Tipo -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Nome <span class="text-red-400">*</span></label>
            <input type="text" name="nome" value="{{ produto.nome | e if produto else '' }}"
                   required class="form-input" placeholder="Ex.: Arroz Parboilizado" />
          </div>
          <div>
            <label class="form-label">Tipo <span class="text-red-400">*</span></label>
            <select name="tipo" required class="form-input">
              {% for tipo_val, tipo_nome in tipos %}
                <option value="{{ tipo_val }}"
                  {% if produto and produto.tipo.value == tipo_val %}selected{% elif not produto and tipo_val == 'RESALE' %}selected{% endif %}>
                  {{ tipo_nome }}
                </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- SKU + Código de Barras -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">SKU</label>
            <input type="text" name="sku" value="{{ produto.sku | e if produto and produto.sku else '' }}"
                   class="form-input" placeholder="Ex.: ARR-001" />
          </div>
          <div>
            <label class="form-label">Código de Barras</label>
            <input type="text" name="codigo_barras" value="{{ produto.codigo_barras | e if produto and produto.codigo_barras else '' }}"
                   class="form-input" placeholder="EAN-13 ou similar" />
          </div>
        </div>

        <!-- Categoria + Unidade Base -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Categoria</label>
            <select name="categoria_id" class="form-input">
              <option value="">— Sem categoria —</option>
              {% for cat in categorias %}
                <option value="{{ cat.id }}"
                  {% if produto and produto.categoria_id == cat.id %}selected{% endif %}>
                  {{ cat.nome | e }}
                </option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="form-label">Unidade Base</label>
            <select name="unidade_base_id" class="form-input">
              <option value="">— Selecione —</option>
              {% for un in unidades %}
                <option value="{{ un.id }}"
                  {% if produto and produto.unidade_base_id == un.id %}selected{% endif %}>
                  {{ un.nome | e }} ({{ un.simbolo | e }})
                </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Preço de venda + Estoque mínimo -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Preço de Venda (R$)</label>
            <input type="number" name="preco_venda" step="0.01" min="0"
                   value="{{ '%.2f' | format(produto.preco_venda | float) if produto and produto.preco_venda else '' }}"
                   class="form-input" placeholder="0.00" />
          </div>
          <div>
            <label class="form-label">Estoque Mínimo</label>
            <input type="number" name="estoque_minimo" step="0.001" min="0"
                   value="{{ '%.3f' | format(produto.estoque_minimo | float) if produto else '0.000' }}"
                   class="form-input" placeholder="0.000" />
          </div>
        </div>

        <!-- Descrição -->
        <div>
          <label class="form-label">Descrição</label>
          <textarea name="descricao" rows="3" class="form-input"
                    placeholder="Descrição opcional do produto">{{ produto.descricao | e if produto and produto.descricao else '' }}</textarea>
        </div>

        <!-- Perecível -->
        <div class="flex items-center gap-3">
          <input type="checkbox" name="is_perecivel" id="is_perecivel" value="1"
                 {% if produto and produto.is_perecivel %}checked{% endif %}
                 class="w-4 h-4 text-primary rounded border-slate-300" />
          <label for="is_perecivel" class="text-sm font-medium text-slate-600">
            Produto perecível (possui prazo de validade)
          </label>
        </div>

        <!-- Botões -->
        <div class="flex items-center gap-3 pt-2">
          <button type="submit"
                  class="bg-primary text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-primary-dark transition-colors">
            {{ 'Salvar Alterações' if produto else 'Cadastrar Produto' }}
          </button>
          <a href="{{ url_for('estoque.listar_produtos') }}"
             class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Cancelar</a>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
