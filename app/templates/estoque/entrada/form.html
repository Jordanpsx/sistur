<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ company_name }} | Entrada de Estoque</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#0d9488', light: '#ccfbf1', dark: '#0f766e' } } } }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .form-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; }
    .form-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(13,148,136,0.3); }
    .form-label { display: block; font-size: 0.75rem; font-weight: 500; color: #64748b; margin-bottom: 0.25rem; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-slate-100">

  <header class="bg-white/80 backdrop-blur border-b border-slate-100 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
      <span class="font-bold text-slate-700 text-sm">{{ company_name | e }} <span class="text-slate-400 font-normal">| Entrada de Estoque</span></span>
      <a href="{{ url_for('estoque.view_estoque') }}" class="text-sm text-slate-500 hover:text-primary transition-colors">← Estoque</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 rounded-xl px-4 py-3 text-sm font-medium
          {% if category == 'sucesso' %}bg-green-50 text-green-700 border border-green-200
          {% elif category == 'erro' %}bg-red-50 text-red-700 border border-red-200
          {% else %}bg-yellow-50 text-yellow-700 border border-yellow-200{% endif %}">
          {{ message | e }}
        </div>
      {% endfor %}
    {% endwith %}

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-6">Registrar Entrada de Lote</h2>

      <form method="POST" action="{{ url_for('estoque.registrar_entrada') }}" class="space-y-5">

        <!-- Produto + Local -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Produto <span class="text-red-400">*</span></label>
            <select name="produto_id" required class="form-input">
              <option value="">— Selecione —</option>
              {% for p in produtos %}
                <option value="{{ p.id }}">{{ p.nome | e }} {% if p.sku %}({{ p.sku | e }}){% endif %}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="form-label">Local de Destino <span class="text-red-400">*</span></label>
            <select name="local_id" required class="form-input">
              <option value="">— Selecione —</option>
              {% for local in locais %}
                <option value="{{ local.id }}">{{ local.nome | e }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Quantidade + Unidade + Custo -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <div>
            <label class="form-label">Quantidade <span class="text-red-400">*</span></label>
            <input type="number" name="quantidade" required step="0.001" min="0.001"
                   class="form-input" placeholder="0.000" />
          </div>
          <div>
            <label class="form-label">Unidade <span class="text-red-400">*</span></label>
            <select name="unidade_id" required class="form-input">
              <option value="">— Selecione —</option>
              {% for un in unidades %}
                <option value="{{ un.id }}">{{ un.nome | e }} ({{ un.simbolo | e }})</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="form-label">Custo Unitário (R$) <span class="text-red-400">*</span></label>
            <input type="number" name="custo_unitario" required step="0.0001" min="0"
                   class="form-input" placeholder="0.0000" />
          </div>
        </div>

        <!-- Datas -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Data de Validade</label>
            <input type="date" name="data_validade" class="form-input" />
          </div>
          <div>
            <label class="form-label">Código do Lote (fornecedor)</label>
            <input type="text" name="codigo_lote" class="form-input" placeholder="Deixe vazio para gerar automaticamente" />
          </div>
        </div>

        <!-- Rastreio -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Local de Aquisição</label>
            <input type="text" name="local_aquisicao" class="form-input" placeholder="Ex.: Mercado Brasil" />
          </div>
          <div>
            <label class="form-label">CNPJ do Fornecedor</label>
            <input type="text" name="fornecedor_cnpj" class="form-input" placeholder="00.000.000/0000-00" />
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="form-label">Número da NF-e</label>
            <input type="text" name="num_nfe" class="form-input" placeholder="Ex.: 12345" />
          </div>
          <div>
            <label class="form-label">Observações</label>
            <input type="text" name="observacoes" class="form-input" placeholder="Notas opcionais…" />
          </div>
        </div>

        <!-- Botões -->
        <div class="flex items-center gap-3 pt-2">
          <button type="submit"
                  class="bg-primary text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-primary-dark transition-colors">
            Registrar Entrada
          </button>
          <a href="{{ url_for('estoque.view_estoque') }}"
             class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Cancelar</a>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
